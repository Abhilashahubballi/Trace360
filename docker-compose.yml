version: "3.9"

# ════════════════════════════════════════════════
#  Trace360 — Local Docker Compose
#  Usage: docker compose up --build
# ════════════════════════════════════════════════

services:

  # ── PostgreSQL ────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: trace360-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: trace360
      POSTGRES_USER: trace360user
      POSTGRES_PASSWORD: trace360pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trace360user -d trace360"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ───────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trace360-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/trace360
      SPRING_DATASOURCE_USERNAME: trace360user
      SPRING_DATASOURCE_PASSWORD: trace360pass

      # JWT
      APP_JWT_SECRET: Trace360SuperSecretKeyForJWTThatIsAtLeast256BitsLong!
      APP_JWT_EXPIRATION: 86400000

      # Email (fill in your Gmail credentials)
      SPRING_MAIL_USERNAME: your-email@gmail.com
      SPRING_MAIL_PASSWORD: your-app-password
      APP_EMAIL_FROM: noreply@trace360.app
      APP_EMAIL_FROM_NAME: Trace360 Delivery Platform

      # Frontend CORS
      APP_FRONTEND_URL: http://localhost:5500
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5500

      # Optional — Twilio SMS
      TWILIO_ACCOUNT_SID: ""
      TWILIO_AUTH_TOKEN: ""
      TWILIO_PHONE_NUMBER: ""

      # Optional — Google Maps ETA
      GOOGLE_MAPS_API_KEY: ""

    depends_on:
      db:
        condition: service_healthy

  # ── Static Frontend (Nginx) ───────────────────
  frontend:
    image: nginx:alpine
    container_name: trace360-frontend
    restart: unless-stopped
    ports:
      - "5500:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend

volumes:
  postgres_data:
