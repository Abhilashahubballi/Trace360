server.port=10000
spring.application.name=trace360-backend

# ══ DATABASE ══
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=3

# ── JPA ──
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ══ JWT ══
app.jwt.secret=${APP_JWT_SECRET:Trace360SuperSecretKeyForJWTThatIsAtLeast256BitsLong!}
app.jwt.expiration=86400000

# ══ EMAIL ══
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:dummy@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:dummypassword}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

app.email.from=${APP_EMAIL_FROM:noreply@trace360.app}
app.email.from-name=${APP_EMAIL_FROM_NAME:Trace360}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ══ LOGGING ══
logging.level.root=WARN
logging.level.com.trace360=INFO

# ══ OTP ══
app.otp.max-attempts=2
app.otp.expiry-minutes=10

# ══ MULTIPART ══
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ══ TWILIO ══
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.phone.number=${TWILIO_PHONE_NUMBER:}

# ══ GOOGLE MAPS ══
google.maps.api.key=${GOOGLE_MAPS_API_KEY:}
